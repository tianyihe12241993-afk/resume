{% extends "base.html" %}
{% block title %}Batch {{ batch.id }} · Admin{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/admin/profiles/{{ profile.id }}" class="text-sm text-gray-500 hover:underline">
    ← {{ profile.name }}
  </a>
  <h1 class="text-2xl font-semibold">{{ batch.created_at|dt }}</h1>
  <p class="text-sm text-gray-500">
    profile: {{ profile.name }} · #{{ batch.id }}
  </p>
</div>

{% if msg %}
  <div class="mb-4 text-sm text-blue-900 bg-blue-50 border border-blue-200 rounded px-3 py-2">
    {{ msg }}
  </div>
{% endif %}

<div id="batch-body" hx-get="/admin/batches/{{ batch.id }}/rows"
     hx-trigger="every 3s [shouldPoll()]" hx-swap="innerHTML">
  {% include "partials/batch_body.html" %}
</div>
{% endblock %}
