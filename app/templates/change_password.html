{% extends "base.html" %}
{% block title %}Change password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border rounded p-6 mt-10">
  <h1 class="text-xl font-semibold mb-4">Change password</h1>
  {% if ok %}
    <p class="mb-4 text-sm text-green-700 bg-green-50 border border-green-200 rounded p-3">
      Password updated.
    </p>
  {% endif %}
  {% if error %}
    <p class="mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded p-3">
      {{ error }}
    </p>
  {% endif %}
  <form method="post" action="/change-password" class="space-y-3">
    <label class="block">
      <span class="text-sm text-gray-700">Current password</span>
      <input name="current" type="password" required class="mt-1 w-full border rounded px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm text-gray-700">New password (min 8 characters)</span>
      <input name="password" type="password" required minlength="8"
             class="mt-1 w-full border rounded px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm text-gray-700">Confirm new password</span>
      <input name="confirm" type="password" required minlength="8"
             class="mt-1 w-full border rounded px-3 py-2">
    </label>
    <button class="w-full bg-gray-900 text-white rounded py-2 hover:bg-gray-800">
      Update password
    </button>
  </form>
</div>
{% endblock %}
