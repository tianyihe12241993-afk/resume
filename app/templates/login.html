{% extends "base.html" %}
{% block title %}Log in · resume-maker{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border rounded p-6 mt-10">
  <h1 class="text-xl font-semibold mb-4">Log in</h1>
  {% if error %}
    <p class="mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded p-3">
      {{ error }}
    </p>
  {% endif %}
  <form method="post" action="/login" class="space-y-3">
    <label class="block">
      <span class="text-sm text-gray-700">Email</span>
      <input name="email" type="email" required autofocus
             class="mt-1 w-full border rounded px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm text-gray-700">Password</span>
      <input name="password" type="password" required
             class="mt-1 w-full border rounded px-3 py-2">
    </label>
    <input type="hidden" name="next" value="{{ next_url or '/' }}">
    <button class="w-full bg-gray-900 text-white rounded py-2 hover:bg-gray-800">
      Log in
    </button>
  </form>
  <p class="mt-4 text-xs text-gray-500">
    First time here? Your admin will share a setup link that lets you pick a password.
  </p>
</div>
{% endblock %}
